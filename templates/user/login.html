<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StreamVault — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#060810; --surface:#0e1120; --glass:rgba(255,255,255,0.04);
      --border:rgba(255,255,255,0.08); --accent:#e63946; --accent2:#ff6b6b;
      --gold:#f4a261; --text:#f0f0f0; --muted:#8a8fa8;
      --font-head:'Bebas Neue',sans-serif; --font-body:'DM Sans',sans-serif;
    }
    body { background:var(--bg); color:var(--text); font-family:var(--font-body); min-height:100vh; display:flex; flex-direction:column; }
    .bg-canvas {
      position:fixed; inset:0; z-index:0;
      background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(230,57,70,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 50% at 80% 70%, rgba(244,162,97,0.08) 0%, transparent 60%), var(--bg);
    }
    .orb { position:fixed; border-radius:50%; filter:blur(80px); opacity:0.18; animation:drift 12s ease-in-out infinite alternate; pointer-events:none; }
    .orb-1 { width:500px; height:500px; background:var(--accent); top:-100px; left:-100px; animation-duration:14s; }
    .orb-2 { width:350px; height:350px; background:var(--gold); bottom:-80px; right:-80px; animation-duration:10s; animation-delay:-5s; }
    @keyframes drift { from{transform:translate(0,0) scale(1)} to{transform:translate(40px,30px) scale(1.08)} }
    .grid-overlay { position:fixed; inset:0; z-index:0; pointer-events:none; background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px); background-size:60px 60px; }
    .navbar { position:relative; z-index:10; height:72px; display:flex; align-items:center; padding:0 48px; }
    .logo { font-family:var(--font-head); font-size:1.8rem; letter-spacing:0.12em; background:linear-gradient(135deg,var(--accent),var(--gold)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
    .auth-wrapper { position:relative; z-index:5; flex:1; display:flex; align-items:center; justify-content:center; padding:24px; }
    .auth-card {
      width:100%; max-width:420px; background:rgba(14,17,32,0.75); border:1px solid var(--border);
      border-radius:20px; padding:44px 40px; backdrop-filter:blur(24px);
      box-shadow:0 30px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04),inset 0 1px 0 rgba(255,255,255,0.07);
      animation:cardIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(32px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .auth-card::before { content:''; display:block; height:3px; background:linear-gradient(to right,var(--accent),var(--gold),transparent); border-radius:3px 3px 0 0; margin:-44px -40px 40px; }
    .auth-card h2 { font-family:var(--font-head); font-size:2.2rem; letter-spacing:0.06em; margin-bottom:6px; }
    .auth-card .subtitle { font-size:0.85rem; color:var(--muted); margin-bottom:20px; }
    /* Flash messages inside card */
    .flash { padding:10px 14px; border-radius:8px; font-size:0.85rem; font-weight:500; margin-bottom:16px; }
    .flash.error { background:rgba(230,57,70,0.15); border:1px solid rgba(230,57,70,0.35); color:#fca5a5; }
    .flash.success { background:rgba(34,197,94,0.15); border:1px solid rgba(34,197,94,0.35); color:#86efac; }
    .field { margin-bottom:18px; }
    .field label { display:block; font-size:0.75rem; font-weight:600; letter-spacing:0.1em; color:var(--muted); text-transform:uppercase; margin-bottom:8px; }
    .field input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-family:var(--font-body); font-size:0.95rem; outline:none; transition:border-color 0.25s,background 0.25s,box-shadow 0.25s; }
    .field input::placeholder { color:var(--muted); }
    .field input:focus { border-color:var(--accent); background:rgba(230,57,70,0.06); box-shadow:0 0 0 3px rgba(230,57,70,0.15); }
    /* BUG FIX: old template had <button><a href="...">Sign In</a></button> which broke form submission.
       The button must be type="submit" with NO anchor tag inside it. */
    .btn-submit {
      width:100%; padding:14px; margin-top:8px;
      background:linear-gradient(135deg,var(--accent) 0%,#c1121f 100%);
      color:#fff; font-family:var(--font-body); font-size:0.95rem; font-weight:700;
      letter-spacing:0.04em; border:none; border-radius:10px; cursor:pointer;
      box-shadow:0 6px 28px rgba(230,57,70,0.4); transition:all 0.25s;
    }
    .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 36px rgba(230,57,70,0.55); }
    .btn-submit:active { transform:translateY(0); }
    .divider { display:flex; align-items:center; gap:12px; margin:24px 0; color:var(--muted); font-size:0.78rem; }
    .divider::before,.divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .auth-footer { text-align:center; font-size:0.85rem; color:var(--muted); }
    .auth-footer a { color:var(--accent2); text-decoration:none; font-weight:600; transition:color 0.2s; }
    .auth-footer a:hover { color:var(--accent); }
  </style>
</head>
<body>
  <div class="bg-canvas"></div>
  <div class="grid-overlay"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <nav class="navbar">
    <a href="/" class="logo">StreamVault</a>
  </nav>

  <div class="auth-wrapper">
    <div class="auth-card">
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to continue streaming</p>

      {% if messages %}
        {% for msg in messages %}
          <div class="flash {{ msg.tags }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" action="/login/">
        {% csrf_token %}
        <div class="field">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Username" autocomplete="username" required/>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" autocomplete="current-password" required/>
        </div>
        <!-- BUG FIX: removed <a href="/category/"> wrapper inside button — it hijacked
             the click, skipped form submission, and navigated to a broken URL instead. -->
        <button type="submit" class="btn-submit">Sign In →</button>
      </form>

      <div class="divider">or</div>
      <p class="auth-footer">New to StreamVault? <a href="/register/">Create an account</a></p>
    </div>
  </div>
</body>
</html>
